<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hello — Welcome</title>
  <meta name="description" content="A simple, beautiful Hello World webpage." />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;600;800&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      background: #0d0d0f;
      font-family: 'Outfit', sans-serif;
      overflow: hidden;
    }

    /* Animated background blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(100px);
      opacity: 0.35;
      animation: drift 8s ease-in-out infinite alternate;
      pointer-events: none;
    }
    .blob-1 {
      width: 500px; height: 500px;
      background: radial-gradient(circle, #6c63ff, #3b82f6);
      top: -150px; left: -150px;
      animation-delay: 0s;
    }
    .blob-2 {
      width: 400px; height: 400px;
      background: radial-gradient(circle, #f43f5e, #fb923c);
      bottom: -100px; right: -100px;
      animation-delay: -4s;
    }
    .blob-3 {
      width: 300px; height: 300px;
      background: radial-gradient(circle, #22d3ee, #818cf8);
      bottom: 80px; left: 100px;
      animation-delay: -2s;
    }

    @keyframes drift {
      from { transform: translate(0, 0) scale(1); }
      to   { transform: translate(40px, 30px) scale(1.1); }
    }

    /* Card */
    .card {
      position: relative;
      z-index: 10;
      background: rgba(255, 255, 255, 0.05);
      border: 1px solid rgba(255, 255, 255, 0.12);
      backdrop-filter: blur(20px);
      -webkit-backdrop-filter: blur(20px);
      border-radius: 2rem;
      padding: 4rem 5rem;
      text-align: center;
      box-shadow: 0 25px 60px rgba(0, 0, 0, 0.5);
      animation: fadeUp 0.9s cubic-bezier(0.22, 1, 0.36, 1) both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(40px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    .greeting {
      font-size: clamp(4rem, 12vw, 9rem);
      font-weight: 800;
      background: linear-gradient(135deg, #ffffff 0%, #a78bfa 40%, #60a5fa 70%, #f472b6 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      line-height: 1;
      letter-spacing: -2px;
      animation: shimmer 4s linear infinite;
      background-size: 200% auto;
    }

    @keyframes shimmer {
      0%   { background-position: 0% center; }
      100% { background-position: 200% center; }
    }

    .tagline {
      margin-top: 1.2rem;
      font-size: 1.1rem;
      font-weight: 300;
      color: rgba(255, 255, 255, 0.5);
      letter-spacing: 0.15em;
      text-transform: uppercase;
    }

    .dot {
      display: inline-block;
      width: 8px; height: 8px;
      border-radius: 50%;
      background: #a78bfa;
      margin: 0 6px;
      animation: pulse 1.5s ease-in-out infinite;
    }
    .dot:nth-child(2) { animation-delay: 0.2s; background: #60a5fa; }
    .dot:nth-child(3) { animation-delay: 0.4s; background: #f472b6; }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.6; }
      50%       { transform: scale(1.5); opacity: 1; }
    }

    .dots-row {
      margin-top: 2.5rem;
    }
  </style>
</head>
<body>

  <!-- Background blobs -->
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>
  <div class="blob blob-3"></div>

  <!-- Main card -->
  <main class="card" id="main-card">
    <h1 class="greeting">Hello</h1>
    <p class="tagline">Welcome to the world wide web</p>
    <div class="dots-row">
      <span class="dot"></span>
      <span class="dot"></span>
      <span class="dot"></span>
    </div>
  </main>

</body>
</html>
